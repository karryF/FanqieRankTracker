<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>类型风向标 · 番茄女频新书榜趋势分析</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="description" content="按类型聚合番茄小说女频新书榜多日趋势，观察题材风向、上榜波动和阅读增长。">
</head>
<body class="trend-page">
    <div class="trend-shell">
        <header class="trend-topbar">
            <div>
                <a href="index.html" class="back-link">Back to ranking</a>
                <h1>类型风向标</h1>
                <p id="trend-subtitle">加载中...</p>
            </div>
            <div class="trend-controls">
                <label class="trend-select-label" for="trend-category">类型</label>
                <select id="trend-category" class="trend-select"></select>
                <div class="trend-range" id="trend-range">
                    <button class="range-btn active" data-days="7">7日</button>
                    <button class="range-btn" data-days="14">14日</button>
                    <button class="range-btn" data-days="30">30日</button>
                    <button class="range-btn" data-days="all">全部</button>
                </div>
            </div>
        </header>

        <main>
            <section class="market-board">
                <article class="market-summary-card">
                    <span class="panel-kicker">全站热点</span>
                    <h2>当下火热类型与题材</h2>
                    <p id="market-summary">正在读取最新榜单和近期趋势。</p>
                    <small id="market-source" class="market-source">统计中</small>
                </article>
                <article class="market-card">
                    <span class="panel-kicker">综合赛道</span>
                    <div id="hot-genre-list" class="hot-list"></div>
                </article>
                <article class="market-card">
                    <span class="panel-kicker">具体分类</span>
                    <div id="hot-type-list" class="hot-list"></div>
                </article>
                <article class="market-card">
                    <span class="panel-kicker">高频题材</span>
                    <div id="hot-theme-list" class="theme-cloud"></div>
                </article>
            </section>

            <section class="trend-overview">
                <article class="trend-score-panel">
                    <span class="panel-kicker">风向强度</span>
                    <div class="trend-score-line">
                        <strong id="trend-score">--</strong>
                        <span id="trend-score-label">计算中</span>
                    </div>
                    <p id="trend-diagnosis">正在汇总多日榜单波动。</p>
                </article>

                <article class="metric-card">
                    <span>新增上榜</span>
                    <strong id="metric-new">--</strong>
                    <small id="metric-new-daily">--</small>
                </article>
                <article class="metric-card">
                    <span>掉出榜单</span>
                    <strong id="metric-dropped">--</strong>
                    <small id="metric-dropped-daily">--</small>
                </article>
                <article class="metric-card">
                    <span>活跃天数</span>
                    <strong id="metric-active">--</strong>
                    <small id="metric-range">--</small>
                </article>
            </section>

            <section class="trend-grid">
                <article class="trend-block trend-block-wide">
                    <div class="block-header">
                        <div>
                            <span class="panel-kicker">日线波动</span>
                            <h2>上榜与掉榜节奏</h2>
                        </div>
                    </div>
                    <div id="daily-bars" class="daily-bars"></div>
                </article>

                <article class="trend-block">
                    <span class="panel-kicker">题材入口</span>
                    <h2>新上榜焦点</h2>
                    <div id="new-books-list" class="compact-list"></div>
                </article>

                <article class="trend-block">
                    <span class="panel-kicker">排名动能</span>
                    <h2>上升作品</h2>
                    <div id="risers-list" class="compact-list"></div>
                </article>

                <article class="trend-block">
                    <span class="panel-kicker">阅读反馈</span>
                    <h2>增长焦点</h2>
                    <div id="reads-list" class="compact-list"></div>
                </article>

                <article class="trend-block trend-block-wide">
                    <span class="panel-kicker">连续观察</span>
                    <h2>每日风向摘要</h2>
                    <div id="summary-feed" class="summary-feed"></div>
                </article>
            </section>
        </main>
    </div>

    <script src="js/trend.js"></script>
</body>
</html>
